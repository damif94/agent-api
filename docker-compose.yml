services:
  agent-api:
    build: .
    container_name: agent-api
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "8090:8000"
    env_file: ../.env
    environment:
      - TZ=${TZ}
    networks:
      - services_shared
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  services_shared:
    external: true
    name: services_shared
